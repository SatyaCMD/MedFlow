apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medflow-ingress
  namespace: medflow
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://medicore360.com"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
spec:
  tls:
  - hosts:
    - medicore360.com
    secretName: medflow-tls-cert
  rules:
  - host: medicore360.com
    http:
      paths:
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: medflow-api-service
            port:
              number: 4000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: medflow-web-service
            port:
              number: 3000
