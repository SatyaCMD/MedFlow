apiVersion: v1
kind: Namespace
metadata:
  name: medflow
  labels:
    name: medflow
    app.kubernetes.io/name: medflow
    app.kubernetes.io/part-of: medicore360
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: medflow-quota
  namespace: medflow
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: medflow-limit-range
  namespace: medflow
spec:
  limits:
  - default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 250m
      memory: 256Mi
    type: Container
