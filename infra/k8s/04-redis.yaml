apiVersion: apps/v1
kind: Deployment
metadata:
  name: medflow-redis
  namespace: medflow
  labels:
    app: medflow-redis
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medflow-redis
  template:
    metadata:
      labels:
        app: medflow-redis
    spec:
      containers:
      - name: redis
        image: redis:7.0-alpine
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: medflow-redis
  namespace: medflow
  labels:
    app: medflow-redis
spec:
  ports:
  - port: 6379
    targetPort: 6379
    name: redis
  selector:
    app: medflow-redis
