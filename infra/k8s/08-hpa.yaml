apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: medflow-api-hpa
  namespace: medflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: medflow-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: medflow-web-hpa
  namespace: medflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: medflow-web
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
