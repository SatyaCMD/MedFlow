apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: medflow-mongodb
  namespace: medflow
  labels:
    app: medflow-mongodb
    app.kubernetes.io/component: database
spec:
  serviceName: medflow-mongodb
  replicas: 1
  selector:
    matchLabels:
      app: medflow-mongodb
  template:
    metadata:
      labels:
        app: medflow-mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:6.0
        ports:
        - containerPort: 27017
          name: mongodb
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 5
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: mongodb-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: medflow-mongodb
  namespace: medflow
  labels:
    app: medflow-mongodb
spec:
  ports:
  - port: 27017
    targetPort: 27017
    name: mongodb
  clusterIP: None
  selector:
    app: medflow-mongodb
