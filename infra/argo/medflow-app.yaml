apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: medflow-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/your-org/medflow.git' # Replace with actual repo URL
    targetRevision: HEAD
    path: infra/helm/medflow
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
