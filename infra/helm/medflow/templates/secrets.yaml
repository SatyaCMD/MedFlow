apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app: {{ .Release.Name }}-api
type: Opaque
data:
  JWT_ACCESS_SECRET: {{ .Values.secrets.jwtAccessSecret | b64enc | quote }}
  JWT_REFRESH_SECRET: {{ .Values.secrets.jwtRefreshSecret | b64enc | quote }}
  APP_PEPPER: {{ .Values.secrets.appPepper | b64enc | quote }}
  SMTP_HOST: {{ .Values.secrets.smtpHost | b64enc | quote }}
  SMTP_PORT: {{ .Values.secrets.smtpPort | b64enc | quote }}
  SMTP_USER: {{ .Values.secrets.smtpUser | b64enc | quote }}
  SMTP_PASS: {{ .Values.secrets.smtpPass | b64enc | quote }}
