apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "15"
spec:
  rules:
  - host: {{ .Values.domain }}
    http:
      paths:
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-api-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-web-service
            port:
              number: 80
