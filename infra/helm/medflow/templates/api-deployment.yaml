apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app: {{ .Release.Name }}-api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-api
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-api
    spec:
      containers:
      - name: api
        image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
        imagePullPolicy: {{ .Values.api.image.pullPolicy }}
        ports:
        - containerPort: 4000
        env:
        - name: PORT
          value: {{ .Values.api.env.PORT | quote }}
        - name: NODE_ENV
          value: {{ .Values.api.env.NODE_ENV | quote }}
        - name: MONGO_URI
          value: {{ .Values.api.env.MONGO_URI | quote }}
        - name: REDIS_URI
          value: {{ .Values.api.env.REDIS_URI | quote }}
        - name: JWT_ACCESS_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: JWT_ACCESS_SECRET
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: JWT_REFRESH_SECRET
        - name: APP_PEPPER
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: APP_PEPPER
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: SMTP_HOST
        - name: SMTP_PORT
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: SMTP_PORT
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: SMTP_USER
        - name: SMTP_PASS
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-secrets
              key: SMTP_PASS
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 4000
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          {{- toYaml .Values.api.resources | nindent 10 }}
