global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'medflow-api'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['medicore-api-service.production.svc.cluster.local:80']
        labels:
          environment: 'production'
          service: 'api'
