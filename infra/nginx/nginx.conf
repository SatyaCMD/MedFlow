worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Edge Rate Limiting Protection (Max 30 requests/sec per client IP)
    limit_req_zone $binary_remote_addr zone=api_edge_limit:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=addr_conn_limit:10m;

    # Upstream Backend Pool (Round-Robin Load Balancing)
    upstream medflow_api_cluster {
        least_conn; # Route traffic to connection with lowest active load
        server api1:4000 max_fails=3 fail_timeout=10s;
        server api2:4000 max_fails=3 fail_timeout=10s;
        server api3:4000 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80;
        server_name localhost;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Health Probe Endpoint
        location /lb-health {
            access_log off;
            return 200 'MedFlow Load Balancer Online';
        }

        # Reverse Proxy to API Cluster
        location /api/ {
            limit_req zone=api_edge_limit burst=20 nodelay;
            limit_conn addr_conn_limit 50;

            proxy_pass http://medflow_api_cluster;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Error handling fallbacks
        error_page 502 503 504 /custom_50x.json;
        location = /custom_50x.json {
            return 503 '{"success":false,"error":{"code":"SERVICE_UNAVAILABLE","message":"MedFlow load balancer cluster failover."}}';
        }
    }
}
