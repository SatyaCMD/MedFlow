# SonarQube Project Configuration
sonar.projectKey=medicore360-medflow
sonar.projectName=MediCore 360 (MedFlow EHMS)
sonar.projectVersion=1.0.0

# Path to source directories
sonar.sources=apps/api/src,apps/web/src,packages/shared/src

# Exclude dependencies and builds
sonar.exclusions=node_modules/**,**/dist/**,**/.next/**,**/coverage/**,**/*.test.ts,**/*.spec.ts,**/*.d.ts

# Language specifications
sonar.language=ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8
